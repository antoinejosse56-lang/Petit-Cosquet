<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2E6FD9">
<title>Petit Cosquet</title>
<link rel="manifest" href="#" />
<style>
  :root {
    --rose: #E8B4B8;
    --rose-dark: #d4949a;
    --rose-light: #f5d8da;
    --bleu: #2E6FD9;
    --bleu-dark: #1a52a8;
    --bleu-light: #6b9ee8;
    --blanc: #F8F6F5;
    --ardoise: #4A4A5A;
    --texte: #2c2c3a;
    --gris: #f0eeed;
    --gris-mid: #c8c4c2;
    --vert: #4caf7d;
    --orange: #e07b39;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--blanc);
    color: var(--texte);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  /* ── ÉCRAN DE SÉLECTION ── */
  #screen-select {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: linear-gradient(180deg, var(--bleu) 0%, var(--bleu-dark) 100%);
  }

  .hero-img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    display: block;
  }

  .hero-placeholder {
    width: 100%;
    height: 260px;
    background: linear-gradient(135deg, var(--rose) 0%, var(--rose-dark) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
  }

  .select-card {
    background: white;
    margin: -30px 16px 0;
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    flex: 1;
  }

  .select-card h1 {
    font-size: 26px;
    font-weight: 700;
    color: var(--bleu);
    text-align: center;
    margin-bottom: 4px;
  }

  .select-card p {
    text-align: center;
    color: var(--gris-mid);
    font-size: 13px;
    margin-bottom: 20px;
  }

  .famille-section { margin-bottom: 16px; }

  .famille-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--bleu);
    margin-bottom: 8px;
    padding-left: 4px;
  }

  .membres-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .membre-btn {
    background: var(--gris);
    border: 2px solid transparent;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--texte);
  }

  .membre-btn:hover, .membre-btn.selected {
    background: var(--bleu);
    color: white;
    border-color: var(--bleu);
  }

  .membre-btn.admin { border-color: var(--rose-dark); }
  .membre-btn.admin.selected { background: var(--rose-dark); border-color: var(--rose-dark); }

  .btn-entrer {
    width: 100%;
    background: var(--bleu);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 20px;
    transition: background 0.2s;
  }

  .btn-entrer:hover { background: var(--bleu-dark); }
  .btn-entrer:disabled { background: var(--gris-mid); cursor: not-allowed; }

  /* ── APP PRINCIPALE ── */
  #app { display: none; flex-direction: column; min-height: 100vh; }

  /* Header */
  .header {
    background: var(--bleu);
    color: white;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .header-title { font-size: 18px; font-weight: 700; }
  .header-user {
    font-size: 12px;
    background: rgba(255,255,255,0.2);
    padding: 4px 10px;
    border-radius: 12px;
  }

  /* Audio player */
  .audio-bar {
    background: var(--rose);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .audio-bar audio { flex: 1; height: 32px; }
  .audio-label { font-size: 11px; font-weight: 600; color: var(--bleu-dark); white-space: nowrap; }

  /* Navigation */
  .nav-tabs {
    display: flex;
    background: white;
    border-bottom: 2px solid var(--gris);
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 56px;
    z-index: 99;
  }

  .nav-tabs::-webkit-scrollbar { display: none; }

  .nav-tab {
    flex: none;
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--gris-mid);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .nav-tab span { font-size: 18px; }
  .nav-tab.active { color: var(--bleu); border-bottom-color: var(--bleu); }

  /* Contenu */
  .content { flex: 1; padding: 16px; padding-bottom: 20px; }

  /* Cards */
  .card {
    background: white;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    border: 1px solid var(--gris);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .card-title { font-size: 15px; font-weight: 700; color: var(--texte); }
  .card-subtitle { font-size: 12px; color: var(--gris-mid); margin-top: 2px; }

  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 10px;
  }

  .badge-bleu { background: var(--bleu-light); color: white; }
  .badge-rose { background: var(--rose); color: var(--bleu-dark); }
  .badge-vert { background: #d4edda; color: #155724; }
  .badge-orange { background: #fde8d8; color: #7a3500; }

  /* Section title */
  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--bleu);
    margin-bottom: 10px;
    margin-top: 4px;
  }

  /* Boutons */
  .btn {
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary { background: var(--bleu); color: white; }
  .btn-primary:hover { background: var(--bleu-dark); }
  .btn-rose { background: var(--rose); color: var(--bleu-dark); }
  .btn-rose:hover { background: var(--rose-dark); color: white; }
  .btn-danger { background: #fee; color: #c00; border: 1px solid #fcc; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-full { width: 100%; margin-top: 8px; }

  /* Formulaire */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--ardoise); margin-bottom: 4px; display: block; }

  .form-input, .form-select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--gris-mid);
    border-radius: 10px;
    font-size: 14px;
    background: white;
    color: var(--texte);
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-select:focus {
    outline: none;
    border-color: var(--bleu);
  }

  /* Calendrier */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-top: 8px;
  }

  .cal-day-name {
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--gris-mid);
    padding: 4px 0;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    position: relative;
    min-height: 36px;
  }

  .cal-day.other-month { color: var(--gris-mid); }
  .cal-day.today { font-weight: 700; background: var(--gris); }
  .cal-day.has-resa { background: var(--rose-light); }
  .cal-day.occupied { background: var(--bleu); color: white; border-radius: 0; }
  .cal-day.occupied.start { border-radius: 8px 0 0 8px; }
  .cal-day.occupied.end { border-radius: 0 8px 8px 0; }
  .cal-day.occupied.single { border-radius: 8px; }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .cal-nav button {
    background: var(--gris);
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 16px;
  }

  .cal-month { font-size: 16px; font-weight: 700; color: var(--texte); }

  /* Repas toggle */
  .repas-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--gris);
  }

  .repas-toggle:last-child { border-bottom: none; }

  .toggle-label { font-size: 14px; font-weight: 500; }

  .toggle {
    width: 44px;
    height: 24px;
    background: var(--gris-mid);
    border-radius: 12px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    border: none;
  }

  .toggle::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  .toggle.on { background: var(--vert); }
  .toggle.on::after { transform: translateX(20px); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--bleu);
  }

  .modal-close {
    float: right;
    background: var(--gris);
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    cursor: pointer;
    font-size: 16px;
  }

  /* Liste réservations */
  .resa-item {
    display: flex;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--gris);
    gap: 12px;
  }

  .resa-item:last-child { border-bottom: none; }

  .resa-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--bleu);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
  }

  .resa-info { flex: 1; }
  .resa-name { font-size: 14px; font-weight: 700; }
  .resa-dates { font-size: 12px; color: var(--gris-mid); }
  .resa-actions { display: flex; gap: 6px; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--gris-mid);
    font-size: 14px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--gris);
    border-top-color: var(--bleu);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Checklist */
  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--gris);
  }

  .task-check {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--gris-mid);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: white;
    transition: all 0.2s;
  }

  .task-check.done { background: var(--vert); border-color: var(--vert); color: white; }
  .task-label { flex: 1; font-size: 14px; }
  .task-label.done { text-decoration: line-through; color: var(--gris-mid); }
  .task-assignee { font-size: 11px; color: var(--gris-mid); }

  /* Météo */
  .meteo-card {
    background: linear-gradient(135deg, var(--bleu) 0%, var(--bleu-dark) 100%);
    color: white;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .meteo-location { font-size: 12px; opacity: 0.8; }
  .meteo-temp { font-size: 42px; font-weight: 700; }
  .meteo-desc { font-size: 14px; opacity: 0.9; }

  /* Accueil */
  .accueil-hero {
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 16px;
    position: relative;
    height: 160px;
  }

  .accueil-hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .accueil-hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 60%);
    display: flex;
    align-items: flex-end;
    padding: 14px;
  }

  .accueil-hero-text { color: white; }
  .accueil-hero-text h2 { font-size: 20px; font-weight: 700; }
  .accueil-hero-text p { font-size: 12px; opacity: 0.9; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .stat-card {
    background: white;
    border-radius: 12px;
    padding: 12px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .stat-num { font-size: 24px; font-weight: 700; color: var(--bleu); }
  .stat-label { font-size: 10px; color: var(--gris-mid); margin-top: 2px; }

  .empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--gris-mid);
  }

  .empty-icon { font-size: 40px; margin-bottom: 8px; }
  .empty-text { font-size: 14px; }

  /* Covoiturage */
  .covoit-type {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .covoit-type button {
    flex: 1;
    padding: 8px;
    border-radius: 10px;
    border: 2px solid var(--gris-mid);
    background: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .covoit-type button.active {
    border-color: var(--bleu);
    color: var(--bleu);
    background: var(--gris);
  }
</style>
</head>

async function api(table, method='GET', body=null, filter='', returnData=true) {
  const url = `${SUPABASE_URL}/rest/v1/${table}${filter}`;
  const prefer = method === 'POST' && returnData ? 'return=representation' : method === 'PATCH' ? 'return=minimal' : '';
  const opts = {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'X-Client-Info': 'petit-cosquet/1.0',
      ...(prefer ? {'Prefer': prefer} : {})
    },
    mode: 'cors',
    credentials: 'omit'
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(await r.text());
  if (method === 'DELETE' || method === 'PATCH' || !returnData) return null;
  const text = await r.text();
  return text ? JSON.parse(text) : null;
}

// ── SÉLECTION PRÉNOM ──

}

async function renderPlanning() {
  try {
    planning = await api('pc_planning', 'GET', null, '?order=date_arrivee');
    renderCalendar();

    document.getElementById('content').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Erreur</div></div>';

function renderCalendar() {
  const canAdd = ['Admin','Propriétaire'].includes(currentUser.role);
  const today = new Date();
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth + 1, 0);
  const startDow = (firstDay.getDay() + 6) % 7; // lundi = 0
  const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

  let daysHtml = ['L','M','M','J','V','S','D'].map(d => `<div class="cal-day-name">${d}</div>`).join('');

  // cases vides début
  for (let i = 0; i < startDow; i++) daysHtml += '<div class="cal-day other-month"></div>';

  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === today.toISOString().split('T')[0];
    const resas = planning.filter(r => r.date_arrivee <= dateStr && r.date_depart >= dateStr);
    const hasResa = resas.length > 0;
    const nbPersonnes = resas.reduce((sum, r) => sum + (parseInt(r.nombre_personnes) || 1), 0);
    daysHtml += `<div class="cal-day ${isToday?'today':''} ${hasResa?'occupied':''}" onclick="showDayDetail('${dateStr}')">
      ${d}
      ${hasResa ? `<span style="font-size:7px;opacity:0.8">${nbPersonnes}</span>` : ''}
    </div>`;
  }

  // Liste des réservations du mois
  const monthStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  const resas = planning.filter(r => r.date_arrivee.startsWith(monthStr) || r.date_depart.startsWith(monthStr) || (r.date_arrivee < monthStr+'-01' && r.date_depart > monthStr+'-31'));

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <div class="cal-month">${months[calMonth]} ${calYear}</div>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid">${daysHtml}</div>
    </div>

    ${['Admin','Propriétaire'].includes(currentUser.role) ? `<button class="btn btn-primary btn-full" onclick="openModalResa()">+ Nouvelle réservation</button>` : ''}

    <div class="section-title" style="margin-top:16px">Réservations</div>
    ${resas.length > 0 ? `<div class="card">
      ${resas.map(r => {
        const canEdit = currentUser.role === 'Admin' || currentUser.prenom === r.prenom || (currentUser.famille === r.famille && ['Propriétaire','Conjoint'].includes(currentUser.role));
        return `<div class="resa-item">
          <div class="resa-avatar">${r.prenom[0]}</div>
          <div class="resa-info">
            <div class="resa-name">${r.prenom} <span class="badge badge-rose">${r.famille||''}</span></div>
            <div class="resa-dates">${formatDate(r.date_arrivee)} → ${formatDate(r.date_depart)} · ${r.nombre_personnes||'?'} pers.</div>
            ${r.commentaire ? `<div class="resa-dates" style="color:var(--orange)">${r.commentaire}</div>` : ''}
          </div>
          ${canEdit ? `<div class="resa-actions">
            <button class="btn btn-primary btn-sm" onclick="editResa('${r.id}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteResa('${r.id}')">🗑</button>
          </div>` : ''}
        </div>`;
      }).join('')}
    </div>` : '<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">Aucune réservation ce mois</div></div>'}
  `;
}

function changeMonth(d) {
  calMonth += d;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function showDayDetail(dateStr) {
  const resas = planning.filter(r => r.date_arrivee <= dateStr && r.date_depart >= dateStr);
  if (resas.length === 0) return;
  alert(resas.map(r => `${r.prenom} (${r.famille}) - ${r.nombre_personnes||'?'} pers.`).join('\n'));
}

function editResa(id) {
  const resa = planning.find(r => r.id === id);
  if (resa) openModalResa(resa);
}

async function openModalResa(resa=null) {
  document.getElementById('modal-resa-title').textContent = resa ? '✏️ Modifier réservation' : '+ Nouvelle réservation';
  const resaId = resa ? resa.id : '';
  const resaArrivee = resa ? resa.date_arrivee : '';
  const resaDepart = resa ? resa.date_depart : '';
  const resaComment = resa ? (resa.commentaire || '') : '';

  // Charger les participants existants si modification
  let participantsExistants = [];
  let invitesExistants = [];
  if (resaId) {
    const parts = await api('pc_participants','GET',null,`?planning_id=eq.${resaId}`);
    participantsExistants = parts.filter(p=>p.type==='membre').map(p=>p.prenom);
    invitesExistants = parts.filter(p=>p.type==='invite').map(p=>p.prenom);
  }

  // Grouper membres par famille
  const familles = {};
  membres.filter(m=>m.role!=='Locataire').forEach(m => {
    if (!familles[m.famille]) familles[m.famille] = [];
    familles[m.famille].push(m);
  });

  // Trouver les membres déjà présents sur une période qui se chevauche (hors réservation en cours)
  const arriveeTemp = resa ? resa.date_arrivee : '';
  const departTemp = resa ? resa.date_depart : '';
  
  // Charger tous les participants des réservations qui chevauchent
  let membresDejaPresents = [];
  if (arriveeTemp && departTemp) {
    const resasChevauche = planning.filter(r => 
      r.id !== resaId &&
      r.date_arrivee <= departTemp && 
      r.date_depart >= arriveeTemp
    );
    const partsChevauche = await api('pc_participants','GET',null,
      resasChevauche.length > 0 ? `?planning_id=in.(${resasChevauche.map(r=>r.id).join(',')})` : '?planning_id=eq.null'
    );
    membresDejaPresents = partsChevauche.map(p => p.prenom);
  }

  let membresHtml = '';
  for (const [fam, mems] of Object.entries(familles)) {
    membresHtml += `<div style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:var(--bleu);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">${fam}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">`;
    mems.forEach(m => {
      const checked = participantsExistants.includes(m.prenom) || (!resaId && m.prenom === currentUser.prenom);
      const dejaPresent = membresDejaPresents.includes(m.prenom) && !participantsExistants.includes(m.prenom);
      const bg = dejaPresent ? '#ffdddd' : checked ? 'var(--bleu)' : 'var(--gris)';
      const color = dejaPresent ? '#cc0000' : checked ? 'white' : 'var(--texte)';
      const title = dejaPresent ? 'Déjà présent sur cette période' : '';
      membresHtml += `<label title="${title}" style="display:flex;align-items:center;gap:4px;background:${bg};color:${color};padding:4px 10px;border-radius:16px;font-size:13px;cursor:${dejaPresent?'not-allowed':'pointer'};opacity:${dejaPresent?'0.7':'1'}">
        <input type="checkbox" name="resa-membres" value="${m.prenom}" ${checked?'checked':''} ${dejaPresent?'disabled':''} style="display:none" onchange="updateParticipantStyle(this)">
        ${m.prenom}${dejaPresent?' ⚠️':''}
      </label>`;
    });
    membresHtml += `</div></div>`;
  }

  const invitesHtml = invitesExistants.map((inv,i) => `
    <div class="invite-row" style="display:flex;gap:8px;margin-bottom:6px">
      <input type="text" class="form-input invite-nom" value="${inv}" placeholder="Prénom invité" style="flex:1">
      <button onclick="this.parentNode.remove();updateNbPersonnes()" style="background:var(--gris);border:none;border-radius:8px;padding:6px 10px;cursor:pointer">✕</button>
    </div>`).join('');

  // Sélecteur responsable visible uniquement pour Admin
  const isAdmin = currentUser.role === 'Admin';
  // Vérifier droits
  if (!['Admin','Propriétaire'].includes(currentUser.role)) { closeModal('modal-resa'); return; }
  const responsables = membres.filter(m => m.role !== 'Locataire');

  document.getElementById('modal-resa-body').innerHTML = `
    ${isAdmin ? `<div class="form-group">
      <label class="form-label">Responsable de la réservation</label>
      <select class="form-select" id="resa-responsable" onchange="updateFamilleFromResponsable()">
        ${responsables.map(m => `<option value="${m.prenom}" data-famille="${m.famille}" ${m.prenom === (resa ? resa.prenom : currentUser.prenom) ? 'selected' : ''}>${m.prenom} (${m.famille})</option>`).join('')}
      </select>
    </div>` : ''}
    <div class="form-group">
      <label class="form-label">Date d'arrivée</label>
      <input type="date" class="form-input" id="resa-arrivee" value="${resaArrivee}" onchange="updateNbPersonnes()">
    </div>
    <div class="form-group">
      <label class="form-label">Date de départ</label>
      <input type="date" class="form-input" id="resa-depart" value="${resaDepart}">
    </div>
    <div id="doublon-warning" style="display:none;background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:8px;font-size:12px;color:#856404;margin-bottom:8px">
      ⚠️ Les membres en rouge sont déjà présents sur cette période dans une autre réservation.
    </div>
    <div class="form-group">
      <label class="form-label">Participants membres</label>
      ${membresHtml}
    </div>
    <div class="form-group">
      <label class="form-label">Invités extérieurs</label>
      <div id="invites-list">${invitesHtml}</div>
      <button class="btn btn-rose btn-sm" style="margin-top:6px" onclick="addInvite()">+ Ajouter un invité</button>
    </div>
    <div class="form-group" style="background:var(--gris);border-radius:10px;padding:10px;text-align:center">
      <div style="font-size:12px;color:var(--gris-mid)">Total participants</div>
      <div id="nb-total" style="font-size:24px;font-weight:700;color:var(--bleu)">1</div>
    </div>
    <div class="form-group">
      <label class="form-label">Commentaire</label>
      <input type="text" class="form-input" id="resa-comment" value="${resaComment}" placeholder="Optionnel">
    </div>
    <button class="btn btn-primary btn-full" onclick="saveResa('${resaId}')">💾 Enregistrer</button>
    ${resaId ? `<button class="btn btn-danger btn-full" style="margin-top:8px" onclick="deleteResa('${resaId}');closeModal('modal-resa')">🗑 Supprimer</button>` : ''}
  `;
  document.getElementById('modal-resa').classList.add('open');
  updateNbPersonnes();
}

function updateFamilleFromResponsable() {
  // Rien à faire visuellement pour l'instant
}

function updateParticipantStyle(cb) {
  const label = cb.parentNode;
  label.style.background = cb.checked ? 'var(--bleu)' : 'var(--gris)';
  label.style.color = cb.checked ? 'white' : 'var(--texte)';
  updateNbPersonnes();
}

function updateNbPersonnes() {
  const membres_coches = document.querySelectorAll('input[name="resa-membres"]:checked').length;
  const invites = document.querySelectorAll('.invite-nom').length;
  const total = membres_coches + invites;
  const el = document.getElementById('nb-total');
  if (el) el.textContent = total;
}

function addInvite() {
  const div = document.createElement('div');
  div.className = 'invite-row';
  div.style.cssText = 'display:flex;gap:8px;margin-bottom:6px';
  div.innerHTML = `<input type="text" class="form-input invite-nom" placeholder="Prénom invité" style="flex:1" oninput="updateNbPersonnes()">
    <button onclick="this.parentNode.remove();updateNbPersonnes()" style="background:var(--gris);border:none;border-radius:8px;padding:6px 10px;cursor:pointer">✕</button>`;
  document.getElementById('invites-list').appendChild(div);
  updateNbPersonnes();
}

async function saveResa(id) {
  const arrivee = document.getElementById('resa-arrivee').value;
  const depart = document.getElementById('resa-depart').value;
  if (!arrivee || !depart) { alert('Dates obligatoires'); return; }

  const membresCochs = [...document.querySelectorAll('input[name="resa-membres"]:checked')].map(cb=>cb.value);
  const invites = [...document.querySelectorAll('.invite-nom')].map(i=>i.value.trim()).filter(v=>v);
  const totalPersonnes = membresCochs.length + invites.length;

  // Déterminer prénom et famille du responsable
  const selResp = document.getElementById('resa-responsable');
  let resaPrenom, resaFamille;
  if (selResp) {
    resaPrenom = selResp.value;
    resaFamille = selResp.options[selResp.selectedIndex].dataset.famille;
  } else {
    // Pour non-admin: chercher le propriétaire de la famille parmi les cochés
    const proprietaireFamille = membres.find(m => 
      membresCochs.includes(m.prenom) && 
      m.famille === currentUser.famille && 
      m.role === 'Propriétaire'
    );
    resaPrenom = proprietaireFamille ? proprietaireFamille.prenom : currentUser.prenom;
    resaFamille = currentUser.famille;
  }

  const data = {
    prenom: resaPrenom,
    famille: resaFamille,
    nombre_personnes: totalPersonnes || 1,
    date_arrivee: arrivee,
    date_depart: depart,
    commentaire: document.getElementById('resa-comment').value||null,
    email_proprietaire: currentUser.email||null
  };

  try {
    let resaId = id;
    if (id) {
      await api('pc_planning', 'PATCH', data, `?id=eq.${id}`);
      // Supprimer anciens participants
      await api('pc_participants', 'DELETE', null, `?planning_id=eq.${id}`);
    } else {
      const result = await api('pc_planning', 'POST', data);
      resaId = result[0].id;
    }

    // Sauvegarder participants membres
    for (const prenom of membresCochs) {
      await api('pc_participants', 'POST', {planning_id: resaId, prenom, type: 'membre'}, '', false);
    }
    // Sauvegarder invités
    for (const prenom of invites) {
      await api('pc_participants', 'POST', {planning_id: resaId, prenom, type: 'invite'}, '', false);
    }

    closeModal('modal-resa');
    planning = await api('pc_planning', 'GET', null, '?order=date_arrivee');
    renderCalendar();
  } catch(e) { alert('Erreur: ' + e.message); }
}

async function deleteResa(id) {

  await api('pc_planning', 'DELETE', null, `?id=eq.${id}`);
  planning = await api('pc_planning', 'GET', null, '?order=date_arrivee');

// ── REPAS ──
async function renderRepas() {
  try {
    if (!planning.length) planning = await api('pc_planning','GET',null,'?order=date_arrivee');
    const today = new Date().toISOString().split('T')[0];

    // Récupérer tous les participants
    const allParticipants = await api('pc_participants','GET',null,'?order=prenom');

    // Construire la liste des personnes présentes par jour
    const presencesParJour = {};
    for (const r of planning) {
      const parts = allParticipants.filter(p => p.planning_id === r.id);
      const personnes = parts.length > 0 
        ? parts.map(p => ({prenom: p.prenom, famille: r.famille, type: p.type}))
        : [{prenom: r.prenom, famille: r.famille, type: 'membre'}];

      let d = new Date(r.date_arrivee + 'T00:00:00');
      const fin = new Date(r.date_depart + 'T00:00:00');
      while (d <= fin) {
        const ds = d.toISOString().split('T')[0];
        if (!presencesParJour[ds]) presencesParJour[ds] = [];
        personnes.forEach(p => {
          if (!presencesParJour[ds].find(x => x.prenom === p.prenom)) {
            presencesParJour[ds].push(p);
          }
        });
        d.setDate(d.getDate()+1);
      }
    }

    // Jours avec plusieurs familles différentes
    const joursConcernes = Object.entries(presencesParJour)
      .filter(([ds, personnes]) => {
        const familles = new Set(personnes.map(p => p.famille));
        return familles.size > 1 && ds >= today;
      })
      .sort(([a],[b]) => a.localeCompare(b))
      .slice(0, 14);

    if (joursConcernes.length === 0) {
      document.getElementById('content').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🍽️</div>
          <div class="empty-text">Aucun repas partagé prévu<br><small>Actif uniquement quand plusieurs familles sont présentes en même temps</small></div>
        </div>`;
      return;
    }

    const repas = await api('pc_repas','GET',null,'?order=date,prenom');
    let html = '<div class="section-title">Repas partagés à venir</div>';

    for (const [dateStr, personnes] of joursConcernes) {
      const repasJour = repas.filter(r => r.date === dateStr);
      const totalMidi = personnes.filter(p => {
        const rp = repasJour.find(r => r.prenom === p.prenom);
        return rp ? rp.midi !== false : true;
      }).length;
      const totalSoir = personnes.filter(p => {
        const rp = repasJour.find(r => r.prenom === p.prenom);
        return rp ? rp.soir !== false : true;
      }).length;

      const familles = new Set(personnes.map(p => p.famille));

      html += `<div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">${formatDate(dateStr)}</div>
            <div class="card-subtitle">${familles.size} familles · ${personnes.length} personnes</div>
          </div>
          <div style="text-align:right;font-size:13px">
            <div>🌞 <strong>${totalMidi}</strong></div>
            <div>🌙 <strong>${totalSoir}</strong></div>
          </div>
        </div>
        ${personnes.map(p => {
          const repasPersonne = repasJour.find(rp => rp.prenom === p.prenom);
          const midi = repasPersonne ? repasPersonne.midi !== false : true;
          const soir = repasPersonne ? repasPersonne.soir !== false : true;
          const isMe = p.prenom === currentUser.prenom;
          const isAdmin = currentUser.role === 'Admin';
  // Vérifier droits
  if (!['Admin','Propriétaire'].includes(currentUser.role)) { closeModal('modal-resa'); return; }
          const canToggle = isMe || isAdmin;
          return `<div class="repas-toggle">
            <div>
              <div class="toggle-label">${p.prenom} 
                <span style="font-size:11px;color:var(--gris-mid)">${p.famille}</span>
                ${p.type==='invite'?'<span style="font-size:10px;background:var(--orange);color:white;padding:1px 5px;border-radius:8px;margin-left:4px">invité</span>':''}
              </div>
            </div>
            <div style="display:flex;gap:12px;align-items:center">
              <div style="text-align:center">
                <div style="font-size:10px;color:var(--gris-mid)">Midi</div>
                <button class="toggle ${midi?'on':''}" ${!canToggle?'disabled':''} onclick="toggleRepas('${dateStr}','${p.prenom}','midi',${midi})"></button>
              </div>
              <div style="text-align:center">
                <div style="font-size:10px;color:var(--gris-mid)">Soir</div>
                <button class="toggle ${soir?'on':''}" ${!canToggle?'disabled':''} onclick="toggleRepas('${dateStr}','${p.prenom}','soir',${soir})"></button>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }

    document.getElementById('content').innerHTML = html;
  } catch(e) {
    console.error(e);
    document.getElementById('content').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">Erreur</div></div>';
  }
}

async function toggleRepas(date, prenom, type, currentVal) {
  try {
    const existing = await api('pc_repas','GET',null,`?date=eq.${date}&prenom=eq.${prenom}`);
    const newVal = !currentVal;
    if (existing.length > 0) {
      await api('pc_repas','PATCH',{[type]:newVal},`?date=eq.${date}&prenom=eq.${prenom}`);
    } else {
      await api('pc_repas','POST',{date,prenom,midi:type==='midi'?newVal:true,soir:type==='soir'?newVal:true});
    }
    renderRepas();
  } catch(e) { alert('Erreur'); }
}

async function uploadPhotos(input) {
  const files = Array.from(input.files);
  if (!files.length) return;

  const progress = document.getElementById('upload-progress');
  const bar = document.getElementById('progress-bar');
  const status = document.getElementById('upload-status');
  progress.style.display = 'block';

  let done = 0;
  for (const file of files) {
    status.textContent = `Upload ${done+1}/${files.length} : ${file.name}`;
    try {
      // Upload vers Cloudinary
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', CLOUDINARY_PRESET);
      formData.append('folder', 'petit-cosquet');

      const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
        method: 'POST',
        body: formData
      });
      const data = await r.json();

      if (data.secure_url) {
        // Sauvegarder métadonnées dans Supabase
        const thumbnail = data.secure_url.replace('/upload/', '/upload/w_300,h_300,c_fill/');
        await api('pc_photos', 'POST', {
          url: data.secure_url,
          thumbnail_url: thumbnail,
          public_id: data.public_id,
          auteur: currentUser.prenom,
          legende: '',
          date_prise: new Date().toISOString().split('T')[0]
        }, '', false);
      }
    } catch(e) {
      console.error('Erreur upload:', e);
    }
    done++;
    bar.style.width = (done/files.length*100) + '%';
  }

  status.textContent = `✅ ${done} photo(s) uploadée(s) !`;
  setTimeout(() => {
    progress.style.display = 'none';
    bar.style.width = '0%';
    renderPhotos();
  }, 1500);
  input.value = '';
}

function openPhoto(url, auteur, legende, date) {
  // Créer un overlay plein écran
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer';
  overlay.onclick = () => overlay.remove();
  overlay.innerHTML = `
    <img src="${url}" style="max-width:100%;max-height:80vh;object-fit:contain;border-radius:8px">
    <div style="color:white;text-align:center;margin-top:12px;padding:0 20px">
      ${legende ? `<div style="font-size:15px;font-weight:600">${legende}</div>` : ''}
      <div style="font-size:12px;opacity:0.7;margin-top:4px">${auteur ? '📷 '+auteur : ''} ${date ? '· '+date : ''}</div>
      <div style="font-size:11px;opacity:0.5;margin-top:8px">Appuyer pour fermer</div>
    </div>
  `;
  document.body.appendChild(overlay);
}

async function deletePhoto(id, publicId) {
  if (!confirm('Supprimer cette photo ?')) return;
  await api('pc_photos','DELETE',null,`?id=eq.${id}`);
  renderPhotos();
}

// ── UTILITAIRES ──
function formatDate(d) {
  if (!d) return '?';
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('fr-FR', {day:'numeric',month:'short'});
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// Fermer modal en cliquant dehors
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ── MOT DE PASSE ──
function openChangeMdp() {
  document.getElementById('modal-mdp').classList.add('open');
}

async function saveMdp() {
  const mdp1 = document.getElementById('new-mdp1').value;
  const mdp2 = document.getElementById('new-mdp2').value;
  const err = document.getElementById('mdp-error');
  if (!mdp1 || mdp1.length < 4) { err.style.display='block'; err.textContent='Minimum 4 caractères'; return; }
  if (mdp1 !== mdp2) { err.style.display='block'; err.textContent='Les mots de passe ne correspondent pas'; return; }
  try {
    await api('pc_membres', 'PATCH', {mot_de_passe: mdp1}, `?id=eq.${currentUser.id}`);
    currentUser.mot_de_passe = mdp1;
    err.style.display = 'none';
    closeModal('modal-mdp');
    alert('✅ Mot de passe modifié !');
  } catch(e) { err.style.display='block'; err.textContent='Erreur: '+e.message; }
}

// ── INIT ──
loadMembres();
// Init hero login image
window.addEventListener('DOMContentLoaded', () => {
  const h = document.getElementById('hero-login');
  if (h) h.src = MAISON_IMG;
});
</script>
